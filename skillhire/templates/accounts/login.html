{% extends 'base.html' %}

{% block content %}
{% load static %}



<style>
    body {
        background-image: url("{% static 'images/1537619_4685.jpg' %}");
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        
    }
    
    .login-wrapper {
        min-height: 65vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .login-card {
        width: 100%;
        height: auto;
        max-width: 500px;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 2px 5px 5px rgba(0, 0, 0, 0.2);
        transition: 0.3s;

        background-image: url("{% static 'images/1537619_4685 - Copy.jpg' %}");
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
    }

    .login-card:hover {
        transform: translateY(-5px);
    }

    .login-title {
        font-weight: 600;
        margin-bottom: 20px;
    }

    .input-group-text {
        background: #f1f3f5;
        border-radius: 10px 0 0 10px;
    }

    .form-control {
        border-radius: 0 10px 10px 0;
    }

    .login-btn {
        background: linear-gradient(135deg, #9cb7e0, #6610f2);
        border: none;
        border-radius: 25px;
        padding: 10px;
        transition: 0.3s;
    }

    .login-btn:hover {
        transform: scale(1.05);
    }

    .login-footer a {
        text-decoration: none;
    }

    .login-footer a:hover {
        text-decoration: underline;
    }
</style>

<div class="container">

    <div class="login-wrapper">

        <div class="login-card">

            <h3 class="text-center login-title">Welcome Back</h3>



            <form method="POST">
                {% csrf_token %}

                <!-- Username -->
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                </div>

                <!-- Button -->
                <div class="d-grid mt-4">
                    <button type="submit" class="btn login-btn text-white">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </button>
                </div>

            </form>

            <!-- Footer -->
            <div class="login-footer text-center mt-3">
                <small>
                    Don't have an account?
                    <a href="{% url 'register' %}" class="fw-bold text-primary">
                        Register
                    </a>
                </small>
            </div>

        </div>

    </div>

</div>

{% endblock %}
