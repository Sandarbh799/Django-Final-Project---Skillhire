{% extends 'base.html' %}

{% block content %}
{% load static %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>
    body {
        background-image: url("{% static 'images/1537619_4685.jpg' %}");
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
    }

    .login-wrapper {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 30px;
    }

    .login-card {
        width: 100%;
        max-width: 500px;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 2px 5px 5px rgba(0, 0, 0, 0.2);
        transition: 0.3s;

        background-image: url("{% static 'images/1537619_4685 - Copy.jpg' %}");
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
    }

    .login-card:hover {
        transform: translateY(-5px);
    }

    .login-title {
        font-weight: 600;
        margin-bottom: 20px;
    }

    .input-group-text {
        background: #f1f3f5;
        border-radius: 10px 0 0 10px;
    }

    .form-control {
        border-radius: 0 10px 10px 0;
    }

    .login-btn {
        background: linear-gradient(135deg, #28a745, #218838);
        border: none;
        border-radius: 25px;
        padding: 10px;
        transition: 0.3s;
    }

    .login-btn:hover {
        transform: scale(1.05);
    }

    .login-footer a {
        text-decoration: none;
    }

    .login-footer a:hover {
        text-decoration: underline;
    }
</style>

<div class="container">

    <div class="login-wrapper">

        <div class="login-card">

            <h3 class="text-center login-title">Create Account</h3>

            <form method="POST">
                {% csrf_token %}

                <!-- Username -->
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                </div>

                <!-- Role -->
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person-badge"></i>
                        </span>
                        <select name="role" class="form-control" required>
                            <option value="">Select Role</option>
                            <option value="candidate">Candidate</option>
                            <option value="recruiter">Recruiter</option>
                        </select>
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" name="password1" class="form-control" required>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input type="password" name="password2" class="form-control" required>
                    </div>
                </div>

                <!-- Button -->
                <div class="d-grid mt-4">
                    <button type="submit" class="btn login-btn text-white">
                        <i class="bi bi-person-plus"></i> Register
                    </button>
                </div>

            </form>

            <!-- Footer -->
            <div class="login-footer text-center mt-3">
                <small>
                    Already have an account?
                    <a href="{% url 'login' %}" class="fw-bold text-primary">
                        Login
                    </a>
                </small>
            </div>

        </div>

    </div>

</div>

{% endblock %}
